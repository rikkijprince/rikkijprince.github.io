<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title | escape }}</title>

  <meta name="description"
        content="{{ page.description | default: 'Hybrid English 5.0 — AI-powered English fluency system for professionals.' }}">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Rikki J Prince",
    "url": "https://www.rikkijprince.com",
    "jobTitle": ["Founder", "Author"],
    "sameAs": [
      "https://www.amazon.com/author/rikkijprince"
    ]
  }
  </script>

  <!-- Google Search Console -->
  <meta name="google-site-verification"
        content="9DOZpcg5hHHOQJJdTX8Qtb0kxCDqbQHfnVktEjjZdO4" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q8PEN408E6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-Q8PEN408E6', {
      anonymize_ip: true
    });
  </script>

  {% include book-schema.html %}

</head>

<body>

  {% include navbar.html %}

  <div class="wrapper">

    {% if page.landing %}
      <main class="landing-content">
        {{ content }}
      </main>
    {% else %}
      <main class="page-content">
        <div class="page__inner-wrap">
          {{ content }}
        </div>
      </main>
    {% endif %}

  </div>

  {% include footer.html %}

  <!-- Main JS -->
  <script src="{{ '/js/main.js' | relative_url }}"></script>

  <!-- Mobile Navbar Toggle -->
  <script>
  const toggle = document.getElementById("navToggle");
  const menu = document.getElementById("navMenu");

  if (toggle) {
    toggle.addEventListener("click", () => {
      menu.classList.toggle("show");
    });
  }
  </script>

</body>
</html>
